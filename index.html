<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Διαδραστικές Προσομοιώσεις</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📚 Διαδραστικές Προσομοιώσεις</h1>

<p class="subtitle">
  Εκπαιδευτικές εφαρμογές Φυσικής και Θετικών Επιστημών. Δημιουργός: Μπράιλας Διονύσης Φυσικός ΠΕ04.01 (<a href="mailto:denis.brailas@gmail.com">denis.brailas@gmail.com</a>)
  Διάβασε την περιγραφή και επίλεξε.
</p>

<div id="projects"></div>

<script src="projects.js"></script>

<script>
const container = document.getElementById("projects");

projects.forEach((p, i) => {
  const card = document.createElement("a");
card.className = "card";
card.href = `https://propagatorgr.github.io/${p.repo}/`;
card.target = "_blank";
card.rel = "noopener noreferrer";
card.style.textDecoration = "none";
card.style.color = "inherit";


  const coverURL =
    "https://raw.githubusercontent.com/propagatorgr/" + p.repo + "/main/cover.jpg";

  const readmeURL =
    "https://raw.githubusercontent.com/propagatorgr/" + p.repo + "/main/README.md";

  

card.innerHTML = `
  <img src="${coverURL}">
  <h2>${p.title}</h2>
  <p id="desc-${i}"></p>
`;

  container.appendChild(card);

  fetch(readmeURL)
    .then(r => r.text())
    .then(text => {
  const lines = text.split("\n").map(l => l.trim());

  let start = 0;

  // Αν η 1η γραμμή είναι τίτλος (# ...)
  if (lines[start] && lines[start].startsWith("#")) {
    start++;
  }

  // Αν ακολουθεί κενή γραμμή, την προσπερνάμε
  while (lines[start] === "") {
    start++;
  }

  // Παίρνουμε ΜΟΝΟ την πρώτη παράγραφο
  const paragraph = [];
  for (let i = start; i < lines.length; i++) {
    if (lines[i] === "") break;
    paragraph.push(lines[i]);
  }

  document.getElementById("desc-" + i).textContent =
    paragraph.join(" ");
})
});
</script>

</body>
</html>
