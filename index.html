<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Διαδραστικές Προσομοιώσεις</title>

<!-- Φόρτωση CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>📚 Διαδραστικές Προσομοιώσεις</h1>
<p class="subtitle">
Εκπαιδευτικές εφαρμογές Φυσικής και Θετικών Επιστημών.
Διάβασε την περιγραφή και επίλεξε.
</p>

<div id="projects"></div>

<!-- Φόρτωση λίστας projects ΠΡΙΝ τον κώδικα -->
<script src="projects.js"></script>

<script>
const container = document.getElementById("projects");

projects.forEach((p, i) => {
  const card = document.createElement("a");
  card.className = "card";
  card.href = `https://propagatorgr.github.io/${p.repo}/`;
  card.target = "_self";
  card.style.textDecoration = "none";
  card.style.color = "inherit";

  const coverURL =
    `https://raw.githubusercontent.com/propagatorgr/${p.repo}/main/cover.jpg`;

  const readmeURL =
    `https://raw.githubusercontent.com/propagatorgr/${p.repo}/main/README.md`;

  card.innerHTML = `
    <img src="${coverURL}" onerror="this    <p id="desc-${i}">Φόρτωση περιγραφής…</p>
  `;

  container.appendChild(card);

  fetch(readmeURL)
  .then(r => r.text())
  .then(text => {
    const lines = text.split("\n").map(l => l.trim());

    // Αγνόησε αρχικό τίτλο (# ...)
    if (lines[0].startsWith("#")) {
      lines.shift();
    }

    // Πάρε συνεχόμενες μη κενές γραμμές
    const summaryLines = [];
    for (const line of lines) {
      if (line === "") break;
      summaryLines.push(line);
      if (summaryLines.length === 4) break;
    }

    const descEl = document.getElementById(`desc-${i}`);
    if (descEl) {
      descEl.textContent = summaryLines.join(" ");
    }
  })
  .catch(() => {
    const descEl = document.getElementById(`desc-${i}`);
    if (descEl) {
      descEl.textContent = "Δεν βρέθηκε περιγραφή.";
    }
  });
    .catch(() => {
      const descEl = document.getElementById(`desc-${i}`);
      if (descEl) descEl.textContent = "Δεν βρέθηκε περιγραφή.";
    });
});
</script>

</body>
</html>
