<div id="projects"></div>

<!-- ΦΟΡΤΩΣΗ JS -->
<script src="projects.js"></script>

projects.forEach(p => {

  `;

  container.appendChild(card);

      const summary = text

        .filter(l => l.trim() && !l.startsWith("#"))
