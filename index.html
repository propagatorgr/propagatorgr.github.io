<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Διαδραστικές Προσομοιώσεις</title>

<!-- Φόρτωση CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>📚 Διαδραστικές Προσομοιώσεις</h1>
<p class="subtitle">
Εκπαιδευτικές εφαρμογές Φυσικής και Θετικών Επιστημών.
Διάβασε την περιγραφή και επίλεξε.
</p>

<div id="projects"></div>

<!-- Φόρτωση λίστας projects ΠΡΙΝ τον κώδικα -->
<script src="projects.js"></script>

<script>
const container = document.getElementById("projects");

projects.forEach(p => {
  const card = document.createElement("div");
  card.className = "card";

  const coverURL =
    `https://raw.githubusercontent.com/propagatorgr/${p.repo}/main/cover.jpg`;

  const readmeURL =
    `https://raw.githubusercontent.com/propagatorgr/${p.repo}/main/README.md`;

  const pageURL =
    `https://propagatorgr.github.io/${p.repo}/`;

  card.innerHTML = `
    <img src="${coverURL}" onerror="this.style <a href="${pageURL} προσομοίωσης</a>
  `;

  container.appendChild(card);

  fetch(readmeURL)
    .then(r => r.text())
    .then(text => {
      const summary = text
        .split("\n")
        .filter(line => line.trim() && !line.startsWith("#"))
        .slice(0,4)
        .join(" ");

      const descEl = document.getElementById(`desc-${p.repo}`);
      if (descEl) {
        descEl.textContent = summary;
      }
    })
    .catch(() => {
      const descEl = document.getElementById(`desc-${p.repo}`);
      if (descEl) {
        descEl.textContent = "Δεν βρέθηκε περιγραφή.";
      }
    });
});
</script>

</body>
</html>
