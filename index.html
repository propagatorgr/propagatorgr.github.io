<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Διαδραστικές Προσομοιώσεις</title>

<!-- Φόρτωση CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>📚 Διαδραστικές Προσομοιώσεις</h1>
<p class="subtitle">
Εκπαιδευτικές εφαρμογές Φυσικής και Θετικών Επιστημών.
Διάβασε την περιγραφή και επίλεξε.
</p>

<div id="projects"></div>

<!-- Φόρτωση λίστας projects -->
<script src="projects.js"></script>

<script>
const container = document.getElementById("projects");

projects.forEach((p, i) => {
  // Κάρτα ως link
  const card = document.createElement("a");
  card.className = "card";
  card.href = `https://propagatorgr.github.io/${p.repo}/`;
  card.style.textDecoration = "none";
  card.style.color = "inherit";

  const coverURL =
    `https://raw.githubusercontent.com/propagatorgr/${p.repo}/main/cover.jpg`;

  const readmeURL =
    `https://raw.githubusercontent.com/propagatorgr/${p.repo}/main/README.md`;

  card.innerHTML = `
    <img src="${coverURL}" alt="ppendChild(card);

  // Φόρτωση README
  fetch(readmeURL)
    .then(r => r.text())
    .then(text => {
      const lines = text.split("\n").map(l => l.trim());

      // Αφαίρεση αρχικού τίτλου (# ...)
      if (lines.length && lines[0].startsWith("#")) {
        lines.shift();
      }

      // Πάρε μπλοκ περιγραφής
      const summary = [];
      for (const line of lines) {
        if (line === "") break;
        summary.push(line);
        if (summary.length === 4) break;
      }

      const descEl = document.getElementById(`desc-${i}`);
      descEl.textContent = summary.join(" ");
    })
    .catch(() => {
      const descEl = document.getElementById(`desc-${i}`);
      descEl.textContent = "";
    });
});
</script>

</body>
</html>
